<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ADEQ — Reset Password</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 32px;
      width: 100%; max-width: 380px;
      backdrop-filter: blur(10px);
    }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo-main { font-size: 26px; font-weight: 900; letter-spacing: 3px; }
    .logo-sub { font-size: 12px; font-weight: 700; color: #34d399; letter-spacing: 4px; }
    h1 { font-size: 18px; margin: 0 0 6px; text-align: center; }
    .subtitle { font-size: 12px; color: #94a3b8; text-align: center; margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    input[type=password] {
      width: 100%; padding: 10px 12px; font-size: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #f1f5f9; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
    button {
      width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
      background: linear-gradient(135deg, #0284c7, #0369a1);
      color: white; border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }
    .msg.ok { color: #34d399; }
    .msg.error { color: #fc8181; }
    .hint { font-size: 11px; color: #64748b; text-align: center; margin-top: 18px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-main">ADEQ</div>
      <div class="logo-sub">TOOLBAR</div>
    </div>
    <h1>Reset Password</h1>
    <p class="subtitle">Ingresá tu nueva contraseña</p>

    <form id="reset-form">
      <label for="pw">Nueva contraseña</label>
      <input type="password" id="pw" autocomplete="new-password" minlength="8" required />

      <label for="pw2">Repetir contraseña</label>
      <input type="password" id="pw2" autocomplete="new-password" minlength="8" required />

      <button type="submit" id="submit-btn">Cambiar contraseña</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="hint">
      Después de cambiar la contraseña, podés cerrar esta ventana<br/>
      y volver a la extensión ADEQ Toolbar para loguearte.
    </div>
  </div>

  <script>
    const SUPABASE_URL      = "https://ticjpwimhtfkbccchfyp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpY2pwd2ltaHRma2JjY2NoZnlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDE1MTksImV4cCI6MjA5MDQ3NzUxOX0.85xb7q52QHFsUZIqgOsogexMml--Ag1K3LY-a7cstyU";

    const form      = document.getElementById("reset-form");
    const msgEl     = document.getElementById("msg");
    const submitBtn = document.getElementById("submit-btn");

    // Supabase pone los tokens en el URL hash: #access_token=X&refresh_token=Y&type=recovery
    function getTokenFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      const params = new URLSearchParams(hash);
      return {
        accessToken: params.get("access_token"),
        type:        params.get("type"),
        error:       params.get("error_description"),
      };
    }

    const { accessToken, type, error } = getTokenFromHash();

    if (error) {
      msgEl.textContent = error;
      msgEl.className = "msg error";
      submitBtn.disabled = true;
    } else if (!accessToken || type !== "recovery") {
      msgEl.textContent = "Link inválido o expirado. Solicitá un nuevo email de recuperación.";
      msgEl.className = "msg error";
      submitBtn.disabled = true;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const pw1 = document.getElementById("pw").value;
      const pw2 = document.getElementById("pw2").value;

      msgEl.textContent = ""; msgEl.className = "msg";

      if (pw1 !== pw2) {
        msgEl.textContent = "Las contraseñas no coinciden"; msgEl.className = "msg error"; return;
      }
      if (pw1.length < 8) {
        msgEl.textContent = "Mínimo 8 caracteres"; msgEl.className = "msg error"; return;
      }

      submitBtn.disabled = true; submitBtn.textContent = "Cambiando...";

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: "PUT",
          headers: {
            "Content-Type":  "application/json",
            "apikey":        SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ password: pw1 }),
        });
        const data = await res.json();

        if (!res.ok) {
          msgEl.textContent = data?.msg || data?.error_description || "Error al cambiar la contraseña";
          msgEl.className = "msg error";
          submitBtn.disabled = false; submitBtn.textContent = "Cambiar contraseña";
          return;
        }

        msgEl.textContent = "✓ Contraseña actualizada. Ya podés volver a la extensión y loguearte.";
        msgEl.className = "msg ok";
        form.querySelector("input").disabled = true;
        form.querySelectorAll("input").forEach(i => i.disabled = true);
        submitBtn.disabled = true; submitBtn.textContent = "Listo";
      } catch (err) {
        msgEl.textContent = "Error de conexión: " + err.message;
        msgEl.className = "msg error";
        submitBtn.disabled = false; submitBtn.textContent = "Cambiar contraseña";
      }
    });
  </script>
</body>
</html>
